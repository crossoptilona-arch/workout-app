<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Block 1 — Rebuild</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:wght@400;500;700&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f0e8;
  --bg-alt: #ebe5d8;
  --ink: #1a1816;
  --ink-soft: #4a4540;
  --ink-faint: #8a8278;
  --accent: #c2410c;
  --accent-soft: #fed7aa;
  --line: #d8d1c0;
  --good: #166534;
  --warn: #a16207;
  --danger: #991b1b;
  --serif: 'Fraunces', Georgia, serif;
  --sans: 'Inter Tight', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

body {
  padding-bottom: 140px;
  min-height: 100vh;
  background-image:
    radial-gradient(circle at 20% 0%, rgba(194, 65, 12, 0.04) 0%, transparent 40%),
    radial-gradient(circle at 80% 100%, rgba(22, 101, 52, 0.03) 0%, transparent 40%);
}

/* HEADER */
.header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(8px);
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}

.block-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

.week-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
}

.title {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 32px;
  line-height: 1.05;
  letter-spacing: -0.02em;
  font-variation-settings: "opsz" 96;
}

.title em {
  font-style: italic;
  color: var(--accent);
}

/* DAY TABS */
.day-tabs {
  display: flex;
  gap: 0;
  padding: 0 20px;
  margin-top: 16px;
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--bg);
  position: sticky;
  top: 92px;
  z-index: 49;
}

.day-tabs::-webkit-scrollbar { display: none; }

.day-tab {
  flex: 0 0 auto;
  padding: 12px 12px 14px;
  background: transparent;
  border: none;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.03em;
  color: var(--ink-faint);
  cursor: pointer;
  position: relative;
  white-space: nowrap;
  transition: color 0.2s;
  min-width: 64px;
  text-align: center;
}

.day-tab.active {
  color: var(--ink);
  font-weight: 600;
}

.day-tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 8px;
  right: 8px;
  height: 2px;
  background: var(--accent);
}

.day-tab .day-name {
  display: block;
}

.day-tab .day-focus {
  display: block;
  font-size: 10px;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  margin-top: 2px;
}

/* MAIN CONTENT */
.content {
  padding: 24px 20px 40px;
  max-width: 720px;
  margin: 0 auto;
}

.workout-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
}

.workout-title {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
  font-variation-settings: "opsz" 48;
}

.workout-duration {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* WARMUP */
.warmup {
  background: var(--bg-alt);
  padding: 16px 18px;
  margin-bottom: 24px;
  border-left: 3px solid var(--ink);
  border-radius: 2px;
}

.warmup-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 8px;
}

.warmup-list {
  list-style: none;
  font-size: 14px;
  color: var(--ink-soft);
}

.warmup-list li {
  padding: 3px 0;
  padding-left: 16px;
  position: relative;
}

.warmup-list li::before {
  content: '·';
  position: absolute;
  left: 4px;
  color: var(--ink);
  font-weight: 700;
}

/* BLOCK SECTION */
.block-section {
  margin-bottom: 28px;
}

.block-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 12px;
}

.block-name {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--accent);
  font-variation-settings: "opsz" 14;
}

.block-time {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-faint);
}

/* EXERCISE CARD */
.exercise {
  background: #fbf8f0;
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 16px 18px;
  margin-bottom: 10px;
  position: relative;
  transition: border-color 0.2s;
}

.exercise.expanded {
  border-color: var(--ink);
}

.exercise-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  cursor: pointer;
  gap: 12px;
}

.exercise-title-wrap {
  flex: 1;
  min-width: 0;
}

.exercise-code {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.05em;
}

.exercise-name {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 500;
  line-height: 1.2;
  letter-spacing: -0.01em;
  margin-top: 2px;
  font-variation-settings: "opsz" 36;
}

.exercise-prescription {
  display: flex;
  gap: 12px;
  margin-top: 8px;
  flex-wrap: wrap;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-soft);
}

.exercise-prescription span {
  white-space: nowrap;
}

.exercise-prescription .rpe {
  color: var(--accent);
  font-weight: 700;
}

.exercise-toggle {
  flex: 0 0 auto;
  padding: 6px 10px;
  background: var(--bg-alt);
  border: 1px solid var(--line);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
}

.exercise.expanded .exercise-toggle {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}

.exercise-details {
  display: none;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--line);
}

.exercise.expanded .exercise-details { display: block; }

.detail-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 13px;
  line-height: 1.5;
}

.detail-label {
  flex: 0 0 56px;
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  padding-top: 2px;
}

.detail-text {
  flex: 1;
  color: var(--ink-soft);
}

/* SET LOGGING */
.sets-table {
  margin-top: 14px;
  border-top: 1px solid var(--line);
  padding-top: 12px;
}

.sets-header {
  display: grid;
  grid-template-columns: 28px 1fr 1fr 56px 56px;
  gap: 8px;
  padding-bottom: 6px;
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
}

.set-row {
  display: grid;
  grid-template-columns: 28px 1fr 1fr 56px 56px;
  gap: 8px;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--bg-alt);
}

.set-num {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
}

.set-input {
  width: 100%;
  padding: 7px 8px;
  border: 1px solid var(--line);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 13px;
  background: var(--bg);
  color: var(--ink);
  -webkit-appearance: none;
  appearance: none;
}

.set-input:focus {
  outline: none;
  border-color: var(--accent);
  background: #fff;
}

.set-input::placeholder { color: var(--ink-faint); }

.set-done {
  width: 28px;
  height: 28px;
  border: 1.5px solid var(--line);
  border-radius: 4px;
  background: var(--bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: transparent;
  transition: all 0.15s;
  margin: 0 auto;
}

.set-done.done {
  background: var(--good);
  border-color: var(--good);
  color: white;
}

/* TIMER BAR (sticky bottom) */
.timer-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--ink);
  color: var(--bg);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 -8px 24px rgba(0,0,0,0.15);
  z-index: 100;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.timer-display {
  flex: 0 0 auto;
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.02em;
  min-width: 78px;
  font-variant-numeric: tabular-nums;
}

.timer-display.warning { color: #fbbf24; }
.timer-display.done {
  color: #fca5a5;
  animation: pulse 0.6s ease-in-out 3;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.timer-presets {
  flex: 1;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.timer-preset {
  flex: 1;
  min-width: 0;
  padding: 8px 6px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 3px;
  color: var(--bg);
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}

.timer-preset:active { background: rgba(255,255,255,0.2); }

.timer-controls {
  display: flex;
  gap: 6px;
}

.timer-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
  color: var(--bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

.timer-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
}

.timer-btn:active { transform: scale(0.94); }

/* DEAD HANG TRACKER */
.hang-tracker {
  margin-top: 12px;
  padding: 12px;
  background: linear-gradient(135deg, var(--accent-soft) 0%, transparent 100%);
  border-radius: 4px;
  border-left: 3px solid var(--accent);
}

.hang-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 6px;
}

.hang-progress {
  display: flex;
  align-items: baseline;
  gap: 8px;
  font-family: var(--serif);
}

.hang-current {
  font-size: 24px;
  font-weight: 600;
  color: var(--ink);
}

.hang-target {
  font-size: 13px;
  color: var(--ink-soft);
}

.hang-bar {
  margin-top: 8px;
  height: 4px;
  background: rgba(0,0,0,0.08);
  border-radius: 2px;
  overflow: hidden;
}

.hang-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* WEEK NAV */
.week-nav {
  display: flex;
  gap: 6px;
  margin-top: 12px;
}

.week-btn {
  flex: 1;
  padding: 8px;
  background: var(--bg-alt);
  border: 1px solid var(--line);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.05em;
  color: var(--ink-soft);
  cursor: pointer;
  text-transform: uppercase;
}

.week-btn.active {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}

/* FOOT CHECK */
.foot-check {
  margin-top: 24px;
  padding: 16px 18px;
  background: var(--bg-alt);
  border-radius: 4px;
  border-left: 3px solid var(--warn);
}

.foot-check-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--warn);
  font-weight: 700;
  margin-bottom: 8px;
}

.foot-rating {
  display: flex;
  gap: 4px;
  margin-top: 10px;
}

.foot-num {
  flex: 1;
  height: 32px;
  border: 1px solid var(--line);
  border-radius: 3px;
  background: var(--bg);
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-soft);
  cursor: pointer;
}

.foot-num.selected {
  background: var(--warn);
  color: white;
  border-color: var(--warn);
}

/* BLOCK SWITCHER */
.block-switcher {
  display: inline-flex;
  background: var(--bg-alt);
  border: 1px solid var(--line);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 6px;
}

.block-switcher button {
  padding: 6px 12px;
  background: transparent;
  border: none;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-soft);
  cursor: pointer;
}

.block-switcher button.active {
  background: var(--ink);
  color: var(--bg);
}

/* PREVIEW MODE (BLOCK 2) */
.preview-banner {
  background: var(--ink);
  color: var(--bg);
  padding: 14px 18px;
  border-radius: 4px;
  margin-bottom: 20px;
  font-size: 13px;
  line-height: 1.5;
}

.preview-banner strong {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 500;
  color: var(--accent-soft);
}

/* DELOAD INDICATOR */
.deload-banner {
  background: var(--good);
  color: white;
  padding: 12px 16px;
  border-radius: 4px;
  margin-bottom: 16px;
  font-size: 13px;
}

.deload-banner strong {
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-size: 11px;
  display: block;
  margin-bottom: 4px;
  opacity: 0.85;
}

/* EMPTY STATE */
.empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--ink-faint);
}

/* DAY TYPE STYLING */
.day-tab[data-type="cardio"] .day-focus { color: #1e6091; }
.day-tab[data-type="rest"] .day-focus { color: var(--ink-faint); font-style: italic; }
.day-tab.active[data-type="cardio"]::after { background: #1e6091; }
.day-tab.active[data-type="rest"]::after { background: var(--ink-faint); }

.day-type-banner {
  padding: 10px 14px;
  border-radius: 4px;
  margin-bottom: 16px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.day-type-banner.cardio {
  background: #dbeafe;
  color: #1e3a8a;
  border-left: 3px solid #1e40af;
}

.day-type-banner.rest {
  background: var(--bg-alt);
  color: var(--ink-soft);
  border-left: 3px solid var(--ink-faint);
}

/* RESPONSIVE */
@media (min-width: 768px) {
  .content { padding: 32px 40px 60px; }
  .timer-bar { padding: 16px 32px; }
  .timer-display { font-size: 32px; min-width: 90px; }
  .header { padding: 32px 40px 20px; }
  .day-tabs { padding: 0 40px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <span class="block-label" id="blockLabel">Block 1 · Rebuild</span>
    <span class="week-label" id="weekLabel">Week 1 of 4</span>
  </div>
  <h1 class="title" id="mainTitle">Strength <em>rebuild.</em></h1>
  <div class="block-switcher">
    <button data-block="1" class="active">Block 1</button>
    <button data-block="2">Block 2</button>
  </div>
  <div class="week-nav" id="weekNav"></div>
</header>

<nav class="day-tabs" id="dayTabs"></nav>

<main class="content" id="content"></main>

<div class="timer-bar">
  <div class="timer-display" id="timerDisplay">0:00</div>
  <div class="timer-presets">
    <button class="timer-preset" data-time="45">0:45</button>
    <button class="timer-preset" data-time="60">1:00</button>
    <button class="timer-preset" data-time="75">1:15</button>
    <button class="timer-preset" data-time="90">1:30</button>
    <button class="timer-preset" data-time="120">2:00</button>
  </div>
  <div class="timer-controls">
    <button class="timer-btn primary" id="timerToggle">▶</button>
    <button class="timer-btn" id="timerReset">↺</button>
  </div>
</div>

<script>
// ============= PROGRAM DATA =============

const BLOCK_1 = {

      ]
    },
    {
      key: "tue",

      ],
      blocks: [
        {
          name: "Block A",

            {

              start: "30 lb",

            {

        {

          ]
        },
        {
          name: "Block C",

          exercises: [
            {
              code: "C1",
              name: "Dead Hang (Max Hold)",
              sets: 3, reps: "max time", rest: "90s", rpe: "—",
              start: "16s baseline",
              form: "Passive hang, log time on each set. This is your test day.",
              progression: "Climbing toward 2:00 target.",
              isHang: true
            },
            {

// Storage helpers
async function loadState() {
  try {
    const result = await window.storage.get('workout_state');
    if (result?.value) {
      const saved = JSON.parse(result.value);
      state = { ...state, ...saved };
    }
  } catch (e) {
    // First load, no saved state
  }
}

async function saveState() {
  try {
    await window.storage.set('workout_state', JSON.stringify(state));
  } catch (e) {
    console.error('Save failed:', e);
  }
}

// ============= TIMER =============
let timerSeconds = 0;
let timerTotal = 0;
let timerInterval = null;
let timerRunning = false;

const timerDisplay = document.getElementById('timerDisplay');
const timerToggle = document.getElementById('timerToggle');
const timerReset = document.getElementById('timerReset');

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function updateTimerDisplay() {
  timerDisplay.textContent = formatTime(Math.max(0, timerSeconds));
  timerDisplay.classList.remove('warning', 'done');
  if (timerSeconds <= 0 && timerTotal > 0) {
    timerDisplay.classList.add('done');
  } else if (timerSeconds <= 5 && timerTotal > 0) {
    timerDisplay.classList.add('warning');
  }
}

function startTimer(seconds) {
  if (seconds !== undefined) {
    timerSeconds = seconds;
    timerTotal = seconds;
  }
  if (!timerRunning && timerSeconds > 0) {
    timerRunning = true;
    timerToggle.textContent = '❚❚';
    timerInterval = setInterval(() => {
      timerSeconds--;
      updateTimerDisplay();
      if (timerSeconds <= 0) {
        clearInterval(timerInterval);
        timerRunning = false;
        timerToggle.textContent = '▶';
        // Vibrate if supported
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      }
    }, 1000);
  } else if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    timerToggle.textContent = '▶';
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = 0;
  timerTotal = 0;
  timerToggle.textContent = '▶';
  updateTimerDisplay();
}

document.querySelectorAll('.timer-preset').forEach(btn => {
  btn.addEventListener('click', () => {
    const time = parseInt(btn.dataset.time);
    clearInterval(timerInterval);
    timerRunning = false;
    timerSeconds = time;
    timerTotal = time;
    updateTimerDisplay();
    startTimer();
  });
});

timerToggle.addEventListener('click', () => startTimer());
timerReset.addEventListener('click', resetTimer);

// ============= RENDER =============

function getCurrentProgram() {
  return state.currentBlock === 1 ? BLOCK_1 : BLOCK_2;
}

function renderHeader() {
  const program = getCurrentProgram();
  document.getElementById('blockLabel').textContent = program.name;
  document.getElementById('weekLabel').textContent = `Week ${state.currentWeek} of ${program.weeks}`;
  document.getElementById('mainTitle').innerHTML = program.subtitle;

  // Block switcher
  document.querySelectorAll('.block-switcher button').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.block) === state.currentBlock);
  });

  // Week nav
  const weekNav = document.getElementById('weekNav');
  weekNav.innerHTML = '';
  for (let i = 1; i <= program.weeks; i++) {
    const btn = document.createElement('button');
    btn.className = 'week-btn' + (i === state.currentWeek ? ' active' : '');
    const isDeload = (program.name === BLOCK_1.name && i === 4) || (program.name === BLOCK_2.name && i === 5);
    btn.innerHTML = `W${i}<br><span style="opacity:0.6;font-size:9px">${isDeload ? 'DELOAD' : program.weekRPE[i-1].replace('RPE ', '')}</span>`;
    btn.addEventListener('click', () => {
      state.currentWeek = i;
      saveState();
      renderAll();
    });
    weekNav.appendChild(btn);
  }
}

function renderDayTabs() {
  const program = getCurrentProgram();
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = '';
  program.days.forEach(day => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (day.key === state.currentDay ? ' active' : '');
    btn.setAttribute('data-type', day.type || 'strength');
    btn.innerHTML = `<span class="day-name">${day.name}</span><span class="day-focus">${day.focus}</span>`;
    btn.addEventListener('click', () => {
      state.currentDay = day.key;
      saveState();
      renderAll();
    });
    tabs.appendChild(btn);
  });
}

function getLogKey(blockNum, weekNum, dayKey, exCode, setIdx, field) {
  return `b${blockNum}_w${weekNum}_${dayKey}_${exCode}_s${setIdx}_${field}`;
}

function renderContent() {
  const program = getCurrentProgram();
  const day = program.days.find(d => d.key === state.currentDay) || program.days[0];
  const content = document.getElementById('content');
  const isDeload = (state.currentBlock === 1 && state.currentWeek === 4) || (state.currentBlock === 2 && state.currentWeek === 5);

  let html = '';

  // Preview banner for Block 2
  if (program.preview) {
    html += `<div class="preview-banner">
      <strong>Preview only.</strong> Block 2 unlocks after Block 1 Week 4 is complete and foot tolerance confirmed. Loads, exercises, and impact phase depend on Block 1 outcomes.
    </div>`;
  }

  // Deload banner
  if (isDeload) {
    html += `<div class="deload-banner">
      <strong>Deload week</strong>
      Loads drop 15-20% from Week 3. RPE 6 (4+ reps in tank). No max hangs, no eccentric pull-ups, sprint cut to 4×30s. Aim for +30 min sleep nightly. Should feel easy, that's the point.
    </div>`;
  }

  // Day type banner
  if (day.type === 'cardio') {
    html += `<div class="day-type-banner cardio">Cardio Day · Zone 2 Walk or Sprint</div>`;
  } else if (day.type === 'rest') {
    html += `<div class="day-type-banner rest">Rest Day · No Structured Training</div>`;
  }

  // Workout meta
  html += `<div class="workout-meta">
    <div class="workout-title">${day.title}</div>
    <div class="workout-duration">${day.duration}</div>
  </div>`;

  // Warm-up (only if there is one)
  if (day.warmup && day.warmup.length > 0) {
    html += `<div class="warmup">
      <div class="warmup-label">Warm-Up · 3-7 min</div>
      <ul class="warmup-list">${day.warmup.map(w => `<li>${w}</li>`).join('')}</ul>
    </div>`;
  }

  // Blocks
  day.blocks.forEach(block => {
    html += `<div class="block-section">
      <div class="block-header">
        <span class="block-name">${block.name}</span>
        <span class="block-time">${block.time}</span>
      </div>`;

    block.exercises.forEach(ex => {
      const exId = `ex_${state.currentBlock}_${state.currentWeek}_${day.key}_${ex.code}`;
      html += `<div class="exercise" id="${exId}">
        <div class="exercise-header" data-toggle="${exId}">
          <div class="exercise-title-wrap">
            <div class="exercise-code">${ex.code}</div>
            <div class="exercise-name">${ex.name}</div>
            <div class="exercise-prescription">
              <span>${ex.sets} × ${ex.reps}</span>
              <span>·</span>
              <span>Rest ${ex.rest}</span>
              ${ex.rpe !== "—" ? `<span>·</span><span class="rpe">RPE ${ex.rpe}</span>` : ''}
            </div>
          </div>
          <button class="exercise-toggle">Log</button>
        </div>
        <div class="exercise-details">
          <div class="detail-row">
            <div class="detail-label">Start</div>
            <div class="detail-text">${ex.start}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">Form</div>
            <div class="detail-text">${ex.form}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">Progress</div>
            <div class="detail-text">${ex.progression}</div>
          </div>
          ${renderSetsTable(ex, day.key)}
          ${ex.isHang ? renderHangTracker() : ''}
        </div>
      </div>`;
    });

    html += `</div>`;
  });

  // Foot check (only on strength days)
  if (day.type === 'strength') {
    html += renderFootCheck(day.key);
  }

  content.innerHTML = html;

  // Attach handlers
  attachExerciseHandlers();
  attachSetHandlers();
  if (day.type === 'strength') {
    attachFootCheckHandlers(day.key);
  }
}

function renderSetsTable(ex, dayKey) {
  // Parse rest period to seconds for auto-start timer
  const restSeconds = parseRestToSeconds(ex.rest);

  let rows = `<div class="sets-table">
    <div class="sets-header">
      <span>#</span>
      <span>Weight</span>
      <span>Reps</span>
      <span>RPE</span>
      <span>✓</span>
    </div>`;

  for (let i = 1; i <= ex.sets; i++) {
    const wKey = getLogKey(state.currentBlock, state.currentWeek, dayKey, ex.code, i, 'weight');
    const rKey = getLogKey(state.currentBlock, state.currentWeek, dayKey, ex.code, i, 'reps');
    const rpeKey = getLogKey(state.currentBlock, state.currentWeek, dayKey, ex.code, i, 'rpe');
    const dKey = getLogKey(state.currentBlock, state.currentWeek, dayKey, ex.code, i, 'done');

    const w = state.log[wKey] || '';
    const r = state.log[rKey] || '';
    const rpe = state.log[rpeKey] || '';
    const done = state.log[dKey];

    const weightPlaceholder = ex.isHang ? 'sec' : 'lb';
    const repsPlaceholder = ex.isHang ? '—' : 'reps';
    const isLastSet = i === ex.sets;

    rows += `<div class="set-row">
      <span class="set-num">${i}</span>
      <input class="set-input" type="number" inputmode="decimal" placeholder="${weightPlaceholder}" data-key="${wKey}" value="${w}">
      <input class="set-input" type="text" inputmode="numeric" placeholder="${repsPlaceholder}" data-key="${rKey}" value="${r}" ${ex.isHang ? 'disabled style="opacity:0.4"' : ''}>
      <input class="set-input" type="number" inputmode="decimal" placeholder="—" data-key="${rpeKey}" value="${rpe}" ${ex.rpe === "—" ? 'disabled style="opacity:0.4"' : ''}>
      <button class="set-done ${done ? 'done' : ''}" data-key="${dKey}" data-rest="${restSeconds}" data-last="${isLastSet}">${done ? '✓' : ''}</button>
    </div>`;
  }

  rows += `</div>`;
  return rows;
}

function parseRestToSeconds(restStr) {
  if (!restStr || restStr === '—') return 0;
  // Handle formats: "90s", "60s", "75s", "2:00", "1:30"
  const colonMatch = restStr.match(/(\d+):(\d+)/);
  if (colonMatch) {
    return parseInt(colonMatch[1]) * 60 + parseInt(colonMatch[2]);
  }
  const secondsMatch = restStr.match(/(\d+)s/);
  if (secondsMatch) {
    return parseInt(secondsMatch[1]);
  }
  const minutesMatch = restStr.match(/(\d+)\s*min/);
  if (minutesMatch) {
    return parseInt(minutesMatch[1]) * 60;
  }
  return 0;
}

function renderHangTracker() {
  const pct = Math.min(100, (state.hangBest / 120) * 100);
  return `<div class="hang-tracker">
    <div class="hang-label">Dead Hang Progression → 2:00</div>
    <div class="hang-progress">
      <span class="hang-current">${formatTime(state.hangBest)}</span>
      <span class="hang-target">best · target 2:00</span>
    </div>
    <div class="hang-bar"><div class="hang-fill" style="width: ${pct}%"></div></div>
  </div>`;
}

function renderFootCheck(dayKey) {
  const fcKey = `fc_${state.currentBlock}_${state.currentWeek}_${dayKey}`;
  const current = state.footChecks[fcKey];
  let html = `<div class="foot-check">
    <div class="foot-check-label">Foot Pain Check · Morning After</div>
    <div style="font-size:13px;color:var(--ink-soft)">Rate 0-10 the morning after this session. ≤2 proceed normally. 3-4 hold loads. 5+ stop and reassess.</div>
    <div class="foot-rating">`;
  for (let i = 0; i <= 10; i++) {
    html += `<button class="foot-num ${current === i ? 'selected' : ''}" data-fc="${fcKey}" data-val="${i}">${i}</button>`;
  }
  html += `</div></div>`;
  return html;
}

function attachExerciseHandlers() {
  document.querySelectorAll('.exercise-header').forEach(header => {
    header.addEventListener('click', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
      const targetId = header.dataset.toggle;
      document.getElementById(targetId)?.classList.toggle('expanded');
    });
  });

  document.querySelectorAll('.exercise-toggle').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const card = btn.closest('.exercise');
      card.classList.toggle('expanded');
    });
  });
}

function attachSetHandlers() {
  document.querySelectorAll('.set-input').forEach(input => {
    input.addEventListener('input', (e) => {
      const key = input.dataset.key;
      state.log[key] = input.value;

      // Track hang best if this is a hang exercise weight field
      if (key.includes('_C1_') || key.includes('_C3_') || key.includes('_C4_')) {
        if (key.endsWith('_weight')) {
          const val = parseFloat(input.value);
          // Only update if this is from a hang exercise (we'd need to look up exercise)
          // Simpler: update from any field tagged as hang via UI signal
        }
      }
      saveState();
    });

    input.addEventListener('blur', () => {
      // Update hang best on blur for hang exercises
      checkHangProgress();
    });
  });

  document.querySelectorAll('.set-done').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = btn.dataset.key;
      const wasNotDone = !state.log[key];
      state.log[key] = !state.log[key];
      btn.classList.toggle('done');
      btn.textContent = state.log[key] ? '✓' : '';
      saveState();

      // Auto-start rest timer when checking a set OFF as done (going from undone to done)
      // Don't start if it's the last set of the exercise (no need to rest before next exercise transition unless user wants to)
      if (wasNotDone) {
        const restSeconds = parseInt(btn.dataset.rest);
        const isLast = btn.dataset.last === 'true';
        if (restSeconds > 0) {
          // Always start the rest timer, even on last set (you still rest before next exercise)
          clearInterval(timerInterval);
          timerRunning = false;
          timerSeconds = restSeconds;
          timerTotal = restSeconds;
          updateTimerDisplay();
          startTimer();
          // Brief visual confirmation on the timer bar
          flashTimerBar();
        }
      }
    });
  });
}

function flashTimerBar() {
  const bar = document.querySelector('.timer-bar');
  if (!bar) return;
  bar.style.transition = 'background-color 0.3s';
  bar.style.backgroundColor = 'var(--accent)';
  setTimeout(() => {
    bar.style.backgroundColor = '';
  }, 300);
}

function checkHangProgress() {
  // Find all hang exercise weight fields and update hangBest
  const program = getCurrentProgram();
  let bestThisWeek = state.hangBest;
  program.days.forEach(day => {
    day.blocks.forEach(block => {
      block.exercises.forEach(ex => {
        if (ex.isHang) {
          for (let i = 1; i <= ex.sets; i++) {
            const k = getLogKey(state.currentBlock, state.currentWeek, day.key, ex.code, i, 'weight');
            const v = parseFloat(state.log[k]);
            if (!isNaN(v) && v > bestThisWeek) {
              bestThisWeek = v;
            }
          }
        }
      });
    });
  });
  if (bestThisWeek > state.hangBest) {
    state.hangBest = bestThisWeek;
    saveState();
    // Re-render hang tracker
    document.querySelectorAll('.hang-current').forEach(el => el.textContent = formatTime(state.hangBest));
    document.querySelectorAll('.hang-fill').forEach(el => {
      el.style.width = Math.min(100, (state.hangBest / 120) * 100) + '%';
    });
  }
}

function attachFootCheckHandlers(dayKey) {
  document.querySelectorAll('.foot-num').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.fc;
      const val = parseInt(btn.dataset.val);
      state.footChecks[key] = val;
      document.querySelectorAll(`.foot-num[data-fc="${key}"]`).forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      saveState();
    });
  });
}

function renderAll() {
  renderHeader();
  renderDayTabs();
  renderContent();
}

// Block switcher
document.querySelectorAll('.block-switcher button').forEach(btn => {
  btn.addEventListener('click', () => {
    state.currentBlock = parseInt(btn.dataset.block);
    state.currentWeek = 1;
    state.currentDay = 'tue';
    saveState();
    renderAll();
  });
});

// Init
(async () => {
  await loadState();

  // Default to today's day of week on first load
  if (!state._initialized) {
    const dayMap = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
    const today = new Date().getDay();
    state.currentDay = dayMap[today];
    state._initialized = true;
    await saveState();
  }

  updateTimerDisplay();
  renderAll();
})();
</script>
